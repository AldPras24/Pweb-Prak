<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Alumni UNIKU</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .gallery img {
            width: 150px;
            height: auto;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.1);
            border-color: #4CAF50;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .modal .close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            color: #333;
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Galeri Alumni UNIKU</h1>
    <div class="gallery">
        <img src="Ricky Kusriana Subagja.jpg" alt="Alumni 1">
        <img src="AldiPras.jpeg" alt="Alumni 2">
    </div>

    <!-- Modal -->
    <div class="modal">
        <button class="close">Close</button>
        <img src="" alt="Gambar Besar">
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
