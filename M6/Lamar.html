<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamar Posisi - Portal Alumni</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="TugasM6.html">Portal Alumni</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="Bootsrap.html">Beranda</a></li>
                <li class="nav-item"><a class="nav-link active" href="TugasM6.html">Lowongan Kerja</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Kontak</a></li>
            </ul>
        </div>
    </div>
    </nav>

    <header class="bg-light py-5">
        <div class="container text-center">
            <h1>Lamar Posisi</h1>
            <p class="lead">Isi formulir berikut untuk melamar posisi yang Anda pilih</p>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title text-center mb-4">Formulir Lamaran</h5>
                            <form>
                                <div class="mb-3">
                                    <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                                    <input type="text" class="form-control" id="namaLengkap" placeholder="Masukkan nama lengkap Anda" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" placeholder="Masukkan email Anda" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="nomorTelepon" class="form-label">Nomor Telepon</label>
                                    <input type="tel" class="form-control" id="nomorTelepon" placeholder="Masukkan nomor telepon Anda" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="posisi" class="form-label">Posisi yang Dilamar</label>
                                    <input type="text" class="form-control" id="posisi" placeholder="Masukkan posisi yang Anda lamar" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="suratLamaran" class="form-label">Surat Lamaran</label>
                                    <textarea class="form-control" id="suratLamaran" rows="4" placeholder="Tulis surat lamaran Anda" required></textarea>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="uploadCV" class="form-label">Upload CV</label>
                                    <input type="file" class="form-control" id="uploadCV" required>
                                </div>
                                
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success">Kirim Lamaran</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-primary text-white py-3">
        <div class="container text-center">
            <p>&copy; 2024 Program Studi Sistem Informasi, Universitas Kuningan. Hak cipta dilindungi.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
